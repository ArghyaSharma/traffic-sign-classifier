<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Sign Classifier</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        img {
            margin-top: 15px;
            max-width: 200px;
            border-radius: 8px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Traffic Sign Classifier 🚦</h1>

        <label for="fileInput">Upload Traffic Sign:</label>
        <input type="file" id="fileInput">
        <br><br>

        <button type="button" onclick="uploadImage()">Predict</button>

        <br>
        <img id="preview" src="" alt="" style="display:none;">

        <div id="result"></div>
    </div>

    <script>
        function showPreview(file) {
            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }

        async function uploadImage() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select an image first.");
                return;
            }

            showPreview(file);

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                document.getElementById("result").innerText =
                    `Prediction: ${data.sign_name} (${data.confidence}%)`;

            } catch (error) {
                document.getElementById("result").innerText =
                    "Error: Could not connect to backend.";
            }
        }
    </script>

</body>

</html>
